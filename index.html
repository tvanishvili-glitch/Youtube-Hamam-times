<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HamamTimesTV - Topic Analytics Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-container {
            background: #ffffff;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p.subtitle {
            text-align: center;
            color: #666666;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #333333;
            background-color: #E6E6E6; /* Light gray from your slide */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #D4D4D4;
        }
        button.active {
            background-color: #A32A29; /* Dark Red/Maroon from your slide */
            color: #ffffff;
        }
        .chart-container {
            position: relative;
            height: 550px;
            width: 100%;
            background-color: #F2EBE3; /* Subtle beige background for the chart area */
            padding: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>HamamTimesTV Topic Analytics</h1>
    <p class="subtitle">Based on Top 100 Videos (Multi-Label Classification)</p>

    <div class="controls">
        <button id="btnAvgViews" class="active" onclick="updateChart('Avg_Views', 'Average Views per Video')">Sort by Avg. Views</button>
        <button id="btnTotalViews" onclick="updateChart('Total_Views', 'Total Views')">Sort by Total Views</button>
        <button id="btnSubs" onclick="updateChart('Total_Subs', 'Total Subscribers Gained')">Sort by Subscribers</button>
        <button id="btnCount" onclick="updateChart('Count', 'Number of Videos Uploaded')">Sort by Video Count</button>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    // Data generated from the Excel file provided
    const rawData = [
      { "Topics": "Sports", "Count": 7, "Total_Views": 1029569, "Avg_Views": 147081, "Total_Subs": 985 },
      { "Topics": "Satire, Viral & Trends", "Count": 14, "Total_Views": 1826922, "Avg_Views": 130494, "Total_Subs": 1500 },
      { "Topics": "Corruption & Elites", "Count": 17, "Total_Views": 1781838, "Avg_Views": 104814, "Total_Subs": 1572 },
      { "Topics": "Animals & Pets", "Count": 2, "Total_Views": 205534, "Avg_Views": 102767, "Total_Subs": 111 },
      { "Topics": "Weather & Flooding", "Count": 14, "Total_Views": 1386783, "Avg_Views": 99055, "Total_Subs": 637 },
      { "Topics": "Social Outrage & Tragedy", "Count": 15, "Total_Views": 1460911, "Avg_Views": 97394, "Total_Subs": 1821 },
      { "Topics": "Regional Politics & Karabakh", "Count": 24, "Total_Views": 1957952, "Avg_Views": 81581, "Total_Subs": 1408 },
      { "Topics": "Economy, Utilities & Workers", "Count": 12, "Total_Views": 914326, "Avg_Views": 76193, "Total_Subs": 583 },
      { "Topics": "Crime, Justice & Prison", "Count": 12, "Total_Views": 858843, "Avg_Views": 71570, "Total_Subs": 781 },
      { "Topics": "Global Politics & Conflicts", "Count": 15, "Total_Views": 625403, "Avg_Views": 41693, "Total_Subs": 455 }
    ];

    let chartInstance = null;

    function updateChart(metric, labelText) {
        // Update active button styling
        document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Sort data dynamically
        const sortedData = [...rawData].sort((a, b) => b[metric] - a[metric]);

        const labels = sortedData.map(d => d.Topics);
        const dataValues = sortedData.map(d => d[metric]);

        const ctx = document.getElementById('myChart').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy(); 
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: labelText,
                    data: dataValues,
                    backgroundColor: '#A32A29', // Dark Red from PPT
                    hoverBackgroundColor: '#822120',
                    borderRadius: 0, // Squared edges to match PPT styling
                    borderWidth: 0
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: '#333333',
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.x !== null) {
                                    label += new Intl.NumberFormat('en-US').format(context.parsed.x);
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        grid: {
                            color: '#D4D4D4'
                        },
                        ticks: {
                            color: '#333333',
                            callback: function(value) {
                                if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                                if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
                                return value;
                            }
                        }
                    },
                    y: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#333333',
                            font: {
                                size: 13,
                                family: "'Segoe UI', Tahoma, sans-serif"
                            }
                        }
                    }
                },
                animation: {
                    duration: 600,
                    easing: 'easeOutQuart'
                }
            }
        });
    }

    // Initialize chart
    window.onload = function() {
        // Find the first button and make it active manually for the initial load
        document.getElementById('btnAvgViews').classList.add('active');
        updateChart('Avg_Views', 'Average Views per Video');
    };
</script>

</body>
</html>
