<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');

:root {
    --bg: #EDEDED;
    --card: #FFFFFF;
    --primary: #A63D36;
    --primary-dark: #8E332D;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --button-bg: #E0E0E0;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    background: var(--bg);
}

/* Outer wrapper */
.wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Slide container */
.dashboard-container {
    width: 95vw;
    height: 95vh;
    max-width: 1280px;
    max-height: 720px;

    background: var(--card);
    border-radius: 16px;
    box-sizing: border-box;

    display: flex;
    flex-direction: row;
    gap: 20px;
    padding: 20px;
}

/* Chart */
.chart-container {
    flex: 3;
    min-width: 0;
    height: 100%;
    position: relative;
}

canvas {
    width: 100% !important;
    height: 100% !important;
}

/* Controls */
.controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
}

button {
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: var(--button-bg);
    color: var(--text);
    transition: 0.2s;
}

button:hover {
    transform: translateY(-1px);
}

button.active {
    background: var(--primary);
    color: white;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="dashboard-container">

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div class="controls">
            <button id="btnAvgViews">Average Views</button>
            <button id="btnTotalViews">Total Views</button>
            <button id="btnSubs">Subscribers Gained</button>
            <button id="btnCount">Upload Volume</button>
        </div>

    </div>
</div>

<script>
const rawData = [
  { "Topics": "Sports", "Count": 7, "Total_Views": 1029569, "Avg_Views": 147081, "Total_Subs": 985 },
  { "Topics": "Satire, Viral & Trends", "Count": 14, "Total_Views": 1826922, "Avg_Views": 130494, "Total_Subs": 1500 },
  { "Topics": "Corruption & Elites", "Count": 17, "Total_Views": 1781838, "Avg_Views": 104814, "Total_Subs": 1572 },
  { "Topics": "Animals & Pets", "Count": 2, "Total_Views": 205534, "Avg_Views": 102767, "Total_Subs": 111 },
  { "Topics": "Weather & Flooding", "Count": 14, "Total_Views": 1386783, "Avg_Views": 99055, "Total_Subs": 637 },
  { "Topics": "Social Outrage & Tragedy", "Count": 15, "Total_Views": 1460911, "Avg_Views": 97394, "Total_Subs": 1821 },
  { "Topics": "Regional Politics & Karabakh", "Count": 24, "Total_Views": 1957952, "Avg_Views": 81581, "Total_Subs": 1408 },
  { "Topics": "Economy, Utilities & Workers", "Count": 12, "Total_Views": 914326, "Avg_Views": 76193, "Total_Subs": 583 },
  { "Topics": "Crime, Justice & Prison", "Count": 12, "Total_Views": 858843, "Avg_Views": 71570, "Total_Subs": 781 },
  { "Topics": "Global Politics & Conflicts", "Count": 15, "Total_Views": 625403, "Avg_Views": 41693, "Total_Subs": 455 }
];

let chartInstance = null;

const buttons = {
    Avg_Views: document.getElementById('btnAvgViews'),
    Total_Views: document.getElementById('btnTotalViews'),
    Total_Subs: document.getElementById('btnSubs'),
    Count: document.getElementById('btnCount')
};

function updateChart(metric, labelText, activeBtn) {

    Object.values(buttons).forEach(btn => {
        btn.classList.remove('active');
        btn.style.background = '#E0E0E0';
    });

    activeBtn.classList.add('active');
    activeBtn.style.background = '#A63D36';

    const sorted = [...rawData].sort((a, b) => b[metric] - a[metric]);

    const labels = sorted.map(d => d.Topics);
    const values = sorted.map(d => d[metric]);

    const ctx = document.getElementById('myChart').getContext('2d');

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: labelText,
                data: values,
                backgroundColor: '#A63D36',
                hoverBackgroundColor: '#8E332D',
                borderRadius: 6
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: 10 },

            plugins: {
                legend: { display: false }
            },

            scales: {
                x: {
                    beginAtZero: true,
                    grid: { color: '#DADADA' },
                    ticks: { color: '#6B6B6B' }
                },
                y: {
                    ticks: { color: '#1A1A1A', autoSkip: false },
                    grid: { display: false }
                }
            }
        }
    });
}

/* Button bindings */
buttons.Avg_Views.onclick = () => updateChart('Avg_Views', 'Average Views', buttons.Avg_Views);
buttons.Total_Views.onclick = () => updateChart('Total_Views', 'Total Views', buttons.Total_Views);
buttons.Total_Subs.onclick = () => updateChart('Total_Subs', 'Subscribers', buttons.Total_Subs);
buttons.Count.onclick = () => updateChart('Count', 'Upload Volume', buttons.Count);

/* Init */
window.onload = () => {
    buttons.Avg_Views.click();
};
</script>

</body>
</html>
